# Supply chain defence — GitHub Actions workflow
#
# Add to .github/workflows/supply-chain-check.yml
# Adapt the package manager commands for your project. This example uses pnpm.
#
# IMPORTANT: lockfile-lint supports npm and yarn ONLY. Do NOT add a lockfile-lint
# step for pnpm/bun — it cannot parse their lockfiles and fails CI. pnpm/bun
# verify lockfile integrity natively on a frozen-lockfile install.
#
# For npm/yarn, add these extra steps:
#   - name: Lint lockfile
#     run: npx lockfile-lint --path package-lock.json --type npm --allowed-hosts npm --validate-https
#   - name: Verify provenance signatures   # needs an npm lockfile; omit for pnpm/bun
#     run: npm audit signatures

name: Supply Chain Check
on: [push, pull_request]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit
